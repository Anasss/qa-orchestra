name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-agents:
    name: Validate agent files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate agent structure
        run: node scripts/validate-agents.mjs
