<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <title>QA Orchestra &#x2014; 10 composable QA agents for Claude Code</title>
  <desc>Context sources on the left feed into QA Orchestra's 10 agents in the center, producing structured Markdown QA outputs on the right. Each agent is standalone and writes to qa-output.</desc>

  <style>
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(4px); } 100% { opacity: 1; transform: translateY(0); } }
    .fade { animation: fadeIn 0.4s ease both; }
  </style>

  <rect width="960" height="540" fill="#fafaf9" rx="6"/>

  <!-- Amber top accent -->
  <rect x="0" y="0" width="960" height="3" fill="#b45309" rx="6"/>

  <!-- Column headers -->
  <text x="138" y="34" text-anchor="middle" font-size="10.5" font-weight="600" fill="#78716c" letter-spacing="1.8">CONTEXT SOURCES</text>
  <text x="480" y="34" text-anchor="middle" font-size="10.5" font-weight="600" fill="#78716c" letter-spacing="1.8">ENGINE</text>
  <text x="815" y="34" text-anchor="middle" font-size="10.5" font-weight="600" fill="#78716c" letter-spacing="1.8">QA OUTPUTS</text>

  <!-- LEFT: 6 input cards, 40px tall, 10px gap -->
  <g font-size="13" font-weight="500">
    <g class="fade" style="animation-delay:0.05s">
      <rect x="28" y="56" width="220" height="40" rx="6" fill="#fefce8" stroke="#d4a017" stroke-width="0.75"/>
      <text x="138" y="81" text-anchor="middle" fill="#854d0e">PR diff + branch</text>
    </g>
    <g class="fade" style="animation-delay:0.1s">
      <rect x="28" y="106" width="220" height="40" rx="6" fill="#fefce8" stroke="#d4a017" stroke-width="0.75"/>
      <text x="138" y="131" text-anchor="middle" fill="#854d0e">Acceptance criteria</text>
    </g>
    <g class="fade" style="animation-delay:0.15s">
      <rect x="28" y="156" width="220" height="40" rx="6" fill="#fefce8" stroke="#d4a017" stroke-width="0.75"/>
      <text x="138" y="181" text-anchor="middle" fill="#854d0e">Codebase (multi-repo)</text>
    </g>
    <g class="fade" style="animation-delay:0.2s">
      <rect x="28" y="206" width="220" height="40" rx="6" fill="#fefce8" stroke="#d4a017" stroke-width="0.75"/>
      <text x="138" y="231" text-anchor="middle" fill="#854d0e">Existing test suite</text>
    </g>
    <g class="fade" style="animation-delay:0.25s">
      <rect x="28" y="256" width="220" height="40" rx="6" fill="#fefce8" stroke="#d4a017" stroke-width="0.75"/>
      <text x="138" y="281" text-anchor="middle" fill="#854d0e">Running app (Chrome MCP)</text>
    </g>
    <g class="fade" style="animation-delay:0.3s">
      <rect x="28" y="306" width="220" height="40" rx="6" fill="#fefce8" stroke="#d4a017" stroke-width="0.75"/>
      <text x="138" y="331" text-anchor="middle" fill="#854d0e">Test data / fixtures</text>
    </g>
  </g>

  <!-- Wires: left to center -->
  <g fill="none" stroke="#d6d3d1" stroke-width="1">
    <path d="M248,76 C305,76 325,118 355,118"/>
    <path d="M248,126 C305,126 325,156 355,156"/>
    <path d="M248,176 C305,176 325,194 355,194"/>
    <path d="M248,226 C305,226 325,232 355,232"/>
    <path d="M248,276 C305,276 325,280 355,280"/>
    <path d="M248,326 C305,326 325,318 355,318"/>
  </g>

  <!-- CENTER: Engine -->
  <rect x="355" y="50" width="250" height="430" rx="8" fill="#fffbf5" stroke="#b45309" stroke-width="1.25"/>

  <text x="480" y="80" text-anchor="middle" font-size="17" font-weight="700" fill="#292524" letter-spacing="-0.3">QA Orchestra</text>
  <text x="480" y="98" text-anchor="middle" font-size="11" fill="#b45309" font-weight="600">for Claude Code</text>

  <!-- 10 agents, 28px tall, 8px gap = 36px pitch. Start y=114 -->
  <g font-size="12" font-weight="500">
    <rect x="372" y="114" width="216" height="28" rx="4" fill="#fff" stroke="#e7e5e4" stroke-width="0.75"/>
    <text x="480" y="133" text-anchor="middle" fill="#44403c">Functional reviewer</text>

    <rect x="372" y="150" width="216" height="28" rx="4" fill="#fff" stroke="#e7e5e4" stroke-width="0.75"/>
    <text x="480" y="169" text-anchor="middle" fill="#44403c">Test scenario designer</text>

    <rect x="372" y="186" width="216" height="28" rx="4" fill="#fff" stroke="#e7e5e4" stroke-width="0.75"/>
    <text x="480" y="205" text-anchor="middle" fill="#44403c">Smart test selector</text>

    <rect x="372" y="222" width="216" height="28" rx="4" fill="#fff" stroke="#e7e5e4" stroke-width="0.75"/>
    <text x="480" y="241" text-anchor="middle" fill="#44403c">Bug reporter</text>

    <rect x="372" y="258" width="216" height="28" rx="4" fill="#fff" stroke="#e7e5e4" stroke-width="0.75"/>
    <text x="480" y="277" text-anchor="middle" fill="#44403c">Environment manager</text>

    <rect x="372" y="294" width="216" height="28" rx="4" fill="#fff" stroke="#e7e5e4" stroke-width="0.75"/>
    <text x="480" y="313" text-anchor="middle" fill="#44403c">Browser validator</text>

    <rect x="372" y="330" width="216" height="28" rx="4" fill="#fff" stroke="#e7e5e4" stroke-width="0.75"/>
    <text x="480" y="349" text-anchor="middle" fill="#44403c">Automation writer</text>

    <rect x="372" y="366" width="216" height="28" rx="4" fill="#fff" stroke="#e7e5e4" stroke-width="0.75"/>
    <text x="480" y="385" text-anchor="middle" fill="#44403c">Release analyzer</text>

    <rect x="372" y="402" width="216" height="28" rx="4" fill="#fff" stroke="#e7e5e4" stroke-width="0.75"/>
    <text x="480" y="421" text-anchor="middle" fill="#44403c">Manual validator</text>

    <rect x="372" y="438" width="216" height="28" rx="4" fill="#fff" stroke="#e7e5e4" stroke-width="0.75"/>
    <text x="480" y="457" text-anchor="middle" fill="#44403c">Orchestrator</text>
  </g>

  <!-- Wires: center to right. 10 agents at mids: 128,164,200,236,272,308,344,380,416,452 -->
  <!-- 10 outputs at mids: 73,115,157,199,241,283,325,367,409,451 -->
  <g fill="none" stroke="#d6d3d1" stroke-width="1">
    <path d="M605,128 C645,128 660,73 700,73"/>
    <path d="M605,164 C645,164 660,115 700,115"/>
    <path d="M605,200 C645,200 660,157 700,157"/>
    <path d="M605,236 C645,236 660,199 700,199"/>
    <path d="M605,272 C645,272 660,241 700,241"/>
    <path d="M605,308 C645,308 660,283 700,283"/>
    <path d="M605,344 C645,344 660,325 700,325"/>
    <path d="M605,380 C645,380 660,367 700,367"/>
    <path d="M605,416 C645,416 660,409 700,409"/>
    <path d="M605,452 C645,452 660,451 700,451"/>
  </g>

  <!-- RIGHT: 10 output cards, 34px tall, 8px gap = 42px pitch. Start y=56 -->
  <g font-size="12" font-weight="500">
    <g class="fade" style="animation-delay:0.35s">
      <rect x="700" y="56" width="230" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
      <text x="815" y="78" text-anchor="middle" fill="#166534">functional-review.md</text>
    </g>
    <g class="fade" style="animation-delay:0.4s">
      <rect x="700" y="98" width="230" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
      <text x="815" y="120" text-anchor="middle" fill="#166534">test-scenarios.md</text>
    </g>
    <g class="fade" style="animation-delay:0.45s">
      <rect x="700" y="140" width="230" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
      <text x="815" y="162" text-anchor="middle" fill="#166534">test-selection.md</text>
    </g>
    <g class="fade" style="animation-delay:0.5s">
      <rect x="700" y="182" width="230" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
      <text x="815" y="204" text-anchor="middle" fill="#166534">bug-reports.md</text>
    </g>
    <g class="fade" style="animation-delay:0.55s">
      <rect x="700" y="224" width="230" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
      <text x="815" y="246" text-anchor="middle" fill="#166534">environment-status.md</text>
    </g>
    <g class="fade" style="animation-delay:0.6s">
      <rect x="700" y="266" width="230" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
      <text x="815" y="288" text-anchor="middle" fill="#166534">browser-validation.md</text>
    </g>
    <g class="fade" style="animation-delay:0.65s">
      <rect x="700" y="308" width="230" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
      <text x="815" y="330" text-anchor="middle" fill="#166534">automation/*.spec.ts</text>
    </g>
    <g class="fade" style="animation-delay:0.7s">
      <rect x="700" y="350" width="230" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
      <text x="815" y="372" text-anchor="middle" fill="#166534">release-analysis.md</text>
    </g>
    <g class="fade" style="animation-delay:0.75s">
      <rect x="700" y="392" width="230" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
      <text x="815" y="414" text-anchor="middle" fill="#166534">validation-report.md</text>
    </g>
    <g class="fade" style="animation-delay:0.8s">
      <rect x="700" y="434" width="230" height="34" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
      <text x="815" y="456" text-anchor="middle" fill="#166534">plan.md</text>
    </g>
  </g>

  <text x="815" y="488" text-anchor="middle" font-size="10.5" fill="#78716c">qa-output/</text>

  <!-- Bottom note -->
  <text x="480" y="524" text-anchor="middle" font-size="10.5" fill="#a8a29e">Every agent reads context/CONTEXT.md &#x2014; your stack, conventions, and AC format in one file</text>

</svg>
